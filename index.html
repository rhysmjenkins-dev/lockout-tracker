<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lockout Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .card { background: white; border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 15px 30px; border-radius: 10px;
            font-size: 1em; cursor: pointer; width: 100%; margin-top: 10px;
            font-weight: 600; transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-secondary { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .btn-success { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .btn-danger { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #555; }
        .hidden { display: none; }
        .screen { display: none; }
        .screen.active { display: block; }
        .player-list { list-style: none; padding: 0; }
        .player-item { padding: 15px; margin: 10px 0; background: #f8f9fa; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .player-item input[type="checkbox"] { width: auto; margin: 0; }
        .hand-input-section { background: #f8f9fa; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .player-hand-row { display: grid; grid-template-columns: 1fr 80px 100px 100px; gap: 10px; align-items: center; padding: 15px; background: white; border-radius: 8px; margin: 10px 0; }
        .player-hand-row label { margin: 0; font-weight: 600; }
        .player-hand-row input[type="number"] { margin: 0; padding: 8px; }
        .checkbox-group { display: flex; gap: 10px; align-items: center; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; margin: 0; font-weight: normal; font-size: 0.9em; }
        .checkbox-group input[type="checkbox"] { width: auto; margin: 0; }
        .game-summary { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .game-summary h3 { margin-bottom: 10px; color: #667eea; }
        .scores-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .scores-table th, .scores-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .scores-table th { background: #667eea; color: white; font-weight: 600; }
        .scores-table tr:hover { background: #f8f9fa; }
        .session-list { list-style: none; padding: 0; }
        .session-item { padding: 15px; margin: 10px 0; background: #f8f9fa; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .session-item:hover { background: #e8e9ff; }
        .session-item-header { font-weight: 600; color: #667eea; margin-bottom: 5px; }
        .session-item-info { font-size: 0.9em; color: #666; }
        .chart-container { position: relative; height: 300px; margin: 20px 0; background: white; padding: 15px; border-radius: 8px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid #667eea; }
        .stat-card h4 { color: #667eea; margin-bottom: 10px; font-size: 0.9em; }
        .stat-value { font-size: 2em; font-weight: bold; color: #333; }
        .loading { text-align: center; padding: 20px; color: #667eea; }
        .error { background: #fee; color: #c33; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .success { background: #efe; color: #3c3; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .nav-buttons .btn { flex: 1; }
        @media (max-width: 600px) {
            .header h1 { font-size: 2em; }
            .card { padding: 15px; }
            .player-hand-row { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎴 Lockout Tracker</h1>
            <p>Track your games, dominate the leaderboard</p>
        </div>

        <div id="homeScreen" class="screen active">
            <div class="card">
                <h2>Welcome!</h2>
                <div id="activeSessionsSection"></div>
                <button class="btn" onclick="showScreen('startSessionScreen')">Start New Session</button>
                <button class="btn btn-secondary" onclick="showScreen('previousSessionsScreen'); loadPreviousSessions();">View Previous Sessions</button>
                <button class="btn btn-secondary" onclick="showScreen('statsScreen'); loadStats();">View Stats</button>
                <button class="btn btn-secondary" onclick="showScreen('addPlayerScreen')">Add New Player</button>
            </div>
        </div>

        <div id="addPlayerScreen" class="screen">
            <div class="card">
                <h2>Add New Player</h2>
                <label for="newPlayerName">Player Name</label>
                <input type="text" id="newPlayerName" placeholder="Enter player name">
                <button class="btn btn-success" onclick="addPlayer()">Add Player</button>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Back</button>
                <div id="addPlayerMessage"></div>
            </div>
        </div>

        <div id="startSessionScreen" class="screen">
            <div class="card">
                <h2>Start New Session</h2>
                <label for="sessionTitle">Session Title</label>
                <input type="text" id="sessionTitle" placeholder="e.g. Magaluf 2024">
                
                <label for="sessionHost">Who's hosting?</label>
                <select id="sessionHost">
                    <option value="">Select host...</option>
                </select>
                
                <label>Select Players</label>
                <div id="playerSelectionList" class="loading">Loading players...</div>
                
                <button class="btn btn-success" onclick="createSession()">Start Session</button>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Cancel</button>
                <div id="sessionMessage"></div>
            </div>
        </div>

        <div id="activeSessionScreen" class="screen">
            <div class="card">
                <h2 id="activeSessionTitle">Session Name</h2>
                <div id="activeSessionInfo"></div>
                
                <div class="hand-input-section">
                    <h4>Hand <span id="currentHandNumber"></span></h4>
                    <div id="handInputs"></div>
                    <button class="btn btn-success" onclick="submitHand()">Submit Hand</button>
                    <div id="handMessage"></div>
                </div>
                
                <div id="sessionScores" class="game-summary"></div>
                
                <button class="btn btn-danger" onclick="endSession()">End Session</button>
            </div>
        </div>

        <div id="previousSessionsScreen" class="screen">
            <div class="card">
                <h2>Previous Sessions</h2>
                <div id="previousSessionsContent" class="loading">Loading...</div>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Back to Home</button>
            </div>
        </div>

        <div id="sessionDetailScreen" class="screen">
            <div class="card">
                <h2 id="sessionDetailTitle">Session Details</h2>
                <div id="sessionDetailContent"></div>
                <div id="sessionDetailGraphs"></div>
                <button class="btn btn-secondary" onclick="showScreen('previousSessionsScreen'); loadPreviousSessions();">Back to Sessions</button>
            </div>
        </div>

        <div id="statsScreen" class="screen">
            <div class="card">
                <h2>Overall Stats</h2>
                <div id="statsContent" class="loading">Loading...</div>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Back to Home</button>
            </div>
        </div>
    </div>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxkjFardqiSyJDk0Yy7YPG_ks5aNx6aQ8-faWZwESIpJgERXJ32BSbpcW5s5TWT-m-Y/exec';

        let currentSession = null;
        let currentHandNumber = 1;
        let allPlayers = [];
        let sessionPlayers = [];
        let allSessions = [];

        async function apiCall(action, params) {
            const url = new URL(API_URL);
            url.searchParams.append('action', action);
            for (let key in params) {
                url.searchParams.append(key, params[key]);
            }
            try {
                const response = await fetch(url);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('API Error:', error);
                return { error: error.message };
            }
        }

        function showScreen(screenId) {
            const screens = document.querySelectorAll('.screen');
            for (let i = 0; i < screens.length; i++) {
                screens[i].classList.remove('active');
            }
            document.getElementById(screenId).classList.add('active');
            if (screenId === 'startSessionScreen') {
                loadPlayersForSession();
            }
        }

        async function loadPlayersForSession() {
            const data = await apiCall('getPlayers', {});
            if (data.error) {
                document.getElementById('playerSelectionList').innerHTML = '<div class="error">Error: ' + data.error + '</div>';
                return;
            }
            allPlayers = data;
            const hostSelect = document.getElementById('sessionHost');
            hostSelect.innerHTML = '<option value="">Select host...</option>';
            for (let i = 0; i < data.length; i++) {
                hostSelect.innerHTML += '<option value="' + data[i].player_id + '">' + data[i].username + '</option>';
            }
            const playerList = document.getElementById('playerSelectionList');
            let html = '<ul class="player-list">';
            for (let i = 0; i < data.length; i++) {
                html += '<li class="player-item"><label><input type="checkbox" value="' + data[i].player_id + '" class="player-checkbox"> ' + data[i].username + '</label></li>';
            }
            html += '</ul>';
            playerList.innerHTML = html;
        }

        async function addPlayer() {
            const username = document.getElementById('newPlayerName').value.trim();
            const messageDiv = document.getElementById('addPlayerMessage');
            if (!username) {
                messageDiv.innerHTML = '<div class="error">Please enter a player name</div>';
                return;
            }
            const data = await apiCall('addPlayer', { username: username, editor_name: username });
            if (data.error) {
                messageDiv.innerHTML = '<div class="error">Error: ' + data.error + '</div>';
            } else {
                messageDiv.innerHTML = '<div class="success">Player added!</div>';
                document.getElementById('newPlayerName').value = '';
                setTimeout(function() { showScreen('homeScreen'); }, 1500);
            }
        }

        async function createSession() {
            const title = document.getElementById('sessionTitle').value.trim();
            const hostId = document.getElementById('sessionHost').value;
            const checkboxes = document.querySelectorAll('.player-checkbox:checked');
            const selectedPlayers = [];
            for (let i = 0; i < checkboxes.length; i++) {
                selectedPlayers.push(checkboxes[i].value);
            }
            const messageDiv = document.getElementById('sessionMessage');
            if (!title || !hostId || selectedPlayers.length === 0) {
                messageDiv.innerHTML = '<div class="error">Please fill all fields</div>';
                return;
            }
            const data = await apiCall('createSession', {
                title: title,
                host_player_id: hostId,
                players_involved: selectedPlayers.join(',')
            });
            if (data.error) {
                messageDiv.innerHTML = '<div class="error">Error: ' + data.error + '</div>';
            } else {
                currentSession = { session_id: data.session_id, title: title, host_player_id: hostId };
                sessionPlayers = [];
                for (let i = 0; i < allPlayers.length; i++) {
                    if (selectedPlayers.indexOf(String(allPlayers[i].player_id)) !== -1) {
                        sessionPlayers.push(allPlayers[i]);
                    }
                }
                currentHandNumber = 1;
                showActiveSession();
            }
        }

        function showActiveSession() {
            document.getElementById('activeSessionTitle').textContent = currentSession.title;
            let playerNames = sessionPlayers.map(p => p.username).join(', ');
            document.getElementById('activeSessionInfo').innerHTML = 
                '<p><strong>Session ID:</strong> ' + currentSession.session_id + '</p>' +
                '<p><strong>Players:</strong> ' + playerNames + '</p>';
            setupHandInputs();
            showScreen('activeSessionScreen');
        }

        function setupHandInputs() {
            document.getElementById('currentHandNumber').textContent = currentHandNumber;
            document.getElementById('handMessage').innerHTML = '';
            const handInputs = document.getElementById('handInputs');
            let html = '';
            for (let i = 0; i < sessionPlayers.length; i++) {
                const player = sessionPlayers[i];
                html += '<div class="player-hand-row">' +
                    '<label>' + player.username + '</label>' +
                    '<input type="number" id="score_' + player.player_id + '" placeholder="Score">' +
                    '<div class="checkbox-group"><label><input type="checkbox" id="lockout_' + player.player_id + '" onchange="handleLockoutChange(' + player.player_id + ')"> Locked Out</label></div>' +
                    '<div class="checkbox-group"><label><input type="checkbox" id="false_' + player.player_id + '" disabled> False</label></div>' +
                    '</div>';
            }
            handInputs.innerHTML = html;
        }

        function handleLockoutChange(playerId) {
            const checkboxes = document.querySelectorAll('[id^="lockout_"]');
            for (let i = 0; i < checkboxes.length; i++) {
                const cb = checkboxes[i];
                const pId = cb.id.replace('lockout_', '');
                const falseCheckbox = document.getElementById('false_' + pId);
                if (cb.checked) {
                    if (pId != playerId) {
                        cb.checked = false;
                    } else {
                        falseCheckbox.disabled = false;
                    }
                } else {
                    falseCheckbox.disabled = true;
                    falseCheckbox.checked = false;
                }
            }
        }

        async function submitHand() {
            const messageDiv = document.getElementById('handMessage');
            const scores = [];
            let lockoutPlayerId = null;
            let falseLockout = false;
            
            for (let i = 0; i < sessionPlayers.length; i++) {
                const player = sessionPlayers[i];
                const scoreVal = parseInt(document.getElementById('score_' + player.player_id).value);
                if (isNaN(scoreVal)) {
                    messageDiv.innerHTML = '<div class="error">Please enter all scores</div>';
                    return;
                }
                scores.push({ player_id: player.player_id, score: scoreVal });
                const isLockedOut = document.getElementById('lockout_' + player.player_id).checked;
                if (isLockedOut) {
                    lockoutPlayerId = player.player_id;
                    falseLockout = document.getElementById('false_' + player.player_id).checked;
                }
            }
            
            if (lockoutPlayerId === null) {
                messageDiv.innerHTML = '<div class="error">One player must lock out</div>';
                return;
            }
            
            let hostPlayer = allPlayers.find(p => p.player_id == currentSession.host_player_id);
            const data = await apiCall('addHand', {
                session_id: currentSession.session_id,
                hand_number: currentHandNumber,
                scores: JSON.stringify(scores),
                lockout_player_id: lockoutPlayerId,
                false_lockout: falseLockout,
                editor_name: hostPlayer ? hostPlayer.username : 'Unknown'
            });
            
            if (data.error) {
                messageDiv.innerHTML = '<div class="error">Error: ' + data.error + '</div>';
            } else {
                currentHandNumber++;
                setupHandInputs();
                updateSessionScores();
            }
        }

        async function updateSessionScores() {
            const handsData = await apiCall('getHands', { session_id: currentSession.session_id });
            if (handsData.error) return;
            
            const playerScores = {};
            for (let i = 0; i < sessionPlayers.length; i++) {
                const player = sessionPlayers[i];
                playerScores[player.player_id] = { username: player.username, total: 0, hands: [] };
            }
            
            for (let i = 0; i < handsData.length; i++) {
                const hand = handsData[i];
                if (playerScores[hand.player_id]) {
                    playerScores[hand.player_id].total += Number(hand.score);
                    playerScores[hand.player_id].hands.push({ hand_number: hand.hand_number, score: hand.score });
                }
            }
            
            const scores = Object.values(playerScores).sort((a, b) => a.total - b.total);
            let html = '<h3>Current Scores</h3><table class="scores-table"><tr><th>Player</th><th>Total</th><th>Details</th></tr>';
            for (let i = 0; i < scores.length; i++) {
                const p = scores[i];
                let handDetails = p.hands.map(h => 'H' + h.hand_number + ': ' + h.score).join(' ');
                html += '<tr><td>' + p.username + '</td><td>' + p.total + '</td><td><small>' + handDetails + '</small></td></tr>';
            }
            html += '</table>';
            document.getElementById('sessionScores').innerHTML = html;
        }

        async function endSession() {
            if (!confirm('End this session?')) return;
            let hostPlayer = allPlayers.find(p => p.player_id == currentSession.host_player_id);
            const data = await apiCall('closeSession', {
                session_id: currentSession.session_id,
                editor_name: hostPlayer ? hostPlayer.username : 'Unknown'
            });
            if (data.error) {
                alert('Error: ' + data.error);
            } else {
                alert('Session ended!');
                currentSession = null;
                showScreen('homeScreen');
            }
        }

        async function loadPreviousSessions() {
            const contentDiv = document.getElementById('previousSessionsContent');
            contentDiv.innerHTML = '<div class="loading">Loading sessions...</div>';
            
            const sessionsData = await apiCall('getSessions', {});
            if (sessionsData.error) {
                contentDiv.innerHTML = '<div class="error">Error loading sessions</div>';
                return;
            }
            
            allSessions = sessionsData;
            let html = '<ul class="session-list">';
            
            for (let i = 0; i < sessionsData.length; i++) {
                const session = sessionsData[i];
                html += '<li class="session-item" onclick="viewSessionDetail(' + i + ')">' +
                    '<div class="session-item-header">' + session.title + '</div>' +
                    '<div class="session-item-info">Date: ' + session.date_started + '</div>' +
                    '</li>';
            }
            
            html += '</ul>';
            contentDiv.innerHTML = html;
        }

        function getPlayerName(playerId) {
            for (let i = 0; i < allPlayers.length; i++) {
                if (allPlayers[i].player_id == playerId) {
                    return allPlayers[i].username;
                }
            }
            return 'Unknown';
        }
        async function viewSessionDetail(sessionIndex) {
            const session = allSessions[sessionIndex];
            const handsData = await apiCall('getHands', { session_id: session.session_id });
            
            if (handsData.error) {
                alert('Error loading session details');
                return;
            }
            
            document.getElementById('sessionDetailTitle').textContent = session.title;
            
            const playerTotals = {};
            const playerHands = {};
            
            for (let i = 0; i < handsData.length; i++) {
                const hand = handsData[i];
                if (!playerTotals[hand.player_id]) {
                    playerTotals[hand.player_id] = 0;
                    playerHands[hand.player_id] = [];
                }
                playerTotals[hand.player_id] += Number(hand.score);
                playerHands[hand.player_id].push(Number(hand.score));
            }
            
            let html = '<h3>Final Scores</h3><table class="scores-table"><tr><th>Player</th><th>Total</th></tr>';
            const sortedPlayers = Object.keys(playerTotals).sort(function(a, b) {
                return playerTotals[a] - playerTotals[b];
            });
            
            for (let i = 0; i < sortedPlayers.length; i++) {
                const playerId = sortedPlayers[i];
                const playerName = getPlayerName(playerId);
                html += '<tr><td>' + playerName + '</td><td>' + playerTotals[playerId] + '</td></tr>';
            }
            html += '</table>';
            
            document.getElementById('sessionDetailContent').innerHTML = html;
            
            let graphsHtml = '<h3>Graphs</h3>';
            graphsHtml += '<div class="chart-container"><canvas id="wormChart"></canvas></div>';
            graphsHtml += '<div class="chart-container"><canvas id="manhattanChart"></canvas></div>';
            
            document.getElementById('sessionDetailGraphs').innerHTML = graphsHtml;
            
            showScreen('sessionDetailScreen');
            
            setTimeout(function() {
                drawSessionWormChart(playerHands, sortedPlayers);
                drawSessionManhattanChart(playerHands, sortedPlayers);
            }, 100);
        }

        function drawSessionWormChart(playerHands, playerIds) {
            const ctx = document.getElementById('wormChart');
            if (!ctx) return;
            const datasets = [];
            const colors = ['#667eea', '#f5576c', '#4facfe', '#00f2fe', '#fa709a'];
            
            for (let i = 0; i < playerIds.length; i++) {
                const playerId = playerIds[i];
                const hands = playerHands[playerId];
                let cumulative = 0;
                const cumulativeScores = [];
                
                for (let j = 0; j < hands.length; j++) {
                    cumulative += hands[j];
                    cumulativeScores.push(cumulative);
                }
                
                datasets.push({
                    label: getPlayerName(playerId),
                    data: cumulativeScores,
                    borderColor: colors[i % colors.length],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    tension: 0.1
                });
            }
            
            const maxHands = Math.max.apply(null, Object.keys(playerHands).map(k => playerHands[k].length));
            const labels = [];
            for (let i = 1; i <= maxHands; i++) {
                labels.push('Hand ' + i);
            }
            
            new Chart(ctx.getContext('2d'), {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: 'Cricket Worm - Cumulative Scores' }
                    },
                    scales: { y: { title: { display: true, text: 'Cumulative Score' } } }
                }
            });
        }

        function drawSessionManhattanChart(playerHands, playerIds) {
            const ctx = document.getElementById('manhattanChart');
            if (!ctx) return;
            const datasets = [];
            const colors = ['#667eea', '#f5576c', '#4facfe', '#00f2fe', '#fa709a'];
            const maxHands = Math.max.apply(null, Object.keys(playerHands).map(k => playerHands[k].length));
            
            for (let i = 0; i < playerIds.length; i++) {
                const playerId = playerIds[i];
                const hands = playerHands[playerId];
                const paddedHands = [];
                for (let j = 0; j < maxHands; j++) {
                    paddedHands.push(hands[j] || 0);
                }
                datasets.push({
                    label: getPlayerName(playerId),
                    data: paddedHands,
                    backgroundColor: colors[i % colors.length],
                    borderColor: colors[i % colors.length],
                    borderWidth: 1
                });
            }
            
            const labels = [];
            for (let i = 1; i <= maxHands; i++) {
                labels.push('Hand ' + i);
            }
            
            new Chart(ctx.getContext('2d'), {
                type: 'bar',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: 'Manhattan - Per Hand Scores' }
                    },
                    scales: { y: { stacked: false } }
                }
            });
        }

        async function loadStats() {
            const contentDiv = document.getElementById('statsContent');
            contentDiv.innerHTML = '<div class="loading">Loading stats...</div>';
            
            const playersData = await apiCall('getPlayers', {});
            const sessionsData = await apiCall('getSessions', {});
            
            if (playersData.error || sessionsData.error) {
                contentDiv.innerHTML = '<div class="error">Error loading stats</div>';
                return;
            }
            
            allPlayers = playersData;
            
            const allSessionsData = [];
            for (let s = 0; s < sessionsData.length; s++) {
                const session = sessionsData[s];
                const handsData = await apiCall('getHands', { session_id: session.session_id });
                if (!handsData.error) {
                    allSessionsData.push({
                        session_id: session.session_id,
                        title: session.title,
                        hands: handsData
                    });
                }
            }
            
            const stats = calculateOverallStats(allSessionsData, playersData);
            displayOverallStats(stats, allSessionsData.length);
        }

function calculateOverallStats(allSessionsData, playersData) {
    const playerStats = {};
    
    for (let i = 0; i < playersData.length; i++) {
        const player = playersData[i];
        playerStats[player.player_id] = {
            username: player.username,
            sessionsWon: 0,
            sessionsPlayed: 0,
            handsWon: 0,
            handsPlayed: 0,
            totalScore: 0,
            lockoutScores: [],
            falseLockouts: 0,
            totalLockouts: 0,
            currentHandStreak: 0,
            maxHandStreak: 0,
            bestMargin: 0,
            worstMargin: 0
        };
    }
    
    for (let s = 0; s < allSessionsData.length; s++) {
        const session = allSessionsData[s];
        const playerTotals = {};
        const playerUniqueHands = {}; // ✅ NEW: Track unique hand_numbers per player
        
        for (let i = 0; i < playersData.length; i++) {
            playerUniqueHands[playersData[i].player_id] = new Set(); // ✅ Use Set for unique values
        }
        
        for (let h = 0; h < session.hands.length; h++) {
            const hand = session.hands[h];
            if (!playerTotals[hand.player_id]) {
                playerTotals[hand.player_id] = 0;
            }
            playerTotals[hand.player_id] += Number(hand.score);
            
            if (playerStats[hand.player_id]) {
                playerStats[hand.player_id].totalScore += Number(hand.score);
                playerUniqueHands[hand.player_id].add(hand.hand_number); // ✅ Add unique hand_number
                
                if (hand.lockout_player_id && String(hand.lockout_player_id) === String(hand.player_id)) {
                    playerStats[hand.player_id].totalLockouts++;
                    
                    if (hand.false_lockout == 1 || hand.false_lockout === true) {
                        playerStats[hand.player_id].falseLockouts++;
                        playerStats[hand.player_id].currentHandStreak = 0;
                    } else {
                        playerStats[hand.player_id].handsWon++;
                        playerStats[hand.player_id].currentHandStreak++;
                        if (playerStats[hand.player_id].currentHandStreak > playerStats[hand.player_id].maxHandStreak) {
                            playerStats[hand.player_id].maxHandStreak = playerStats[hand.player_id].currentHandStreak;
                        }
                    }
                } else {
                    playerStats[hand.player_id].currentHandStreak = 0;
                }
            }
        }
        
        // ✅ Count unique hands played per player
        for (let playerId in playerUniqueHands) {
            const uniqueHandCount = playerUniqueHands[playerId].size;
            if (uniqueHandCount > 0) {
                playerStats[playerId].handsPlayed += uniqueHandCount;
                playerStats[playerId].sessionsPlayed++;
            }
        }
        
        // ... rest of the function (winner calculation, margins, etc.) stays the same
        let winnerPlayerId = null;
        let lowestScore = Infinity;
        let secondLowestScore = Infinity;
        
        for (let playerId in playerTotals) {
            const score = playerTotals[playerId];
            if (score < lowestScore) {
                secondLowestScore = lowestScore;
                lowestScore = score;
                winnerPlayerId = playerId;
            } else if (score < secondLowestScore) {
                secondLowestScore = score;
            }
        }
        
        for (let playerId in playerTotals) {
            if (playerStats[playerId]) {
                if (String(playerId) === String(winnerPlayerId)) {
                    playerStats[playerId].sessionsWon++;
                    const margin = secondLowestScore - lowestScore;
                    if (margin > playerStats[playerId].bestMargin) {
                        playerStats[playerId].bestMargin = margin;
                    }
                } else {
                    const margin = playerTotals[playerId] - lowestScore;
                    if (margin > playerStats[playerId].worstMargin) {
                        playerStats[playerId].worstMargin = margin;
                    }
                }
            }
        }
    }
    
    return playerStats;
}
        function displayOverallStats(stats, totalSessions) {
            let mostSessionsWon = { player: 'N/A', wins: 0 };
            let mostHandsWon = { player: 'N/A', hands: 0 };
            let bestSessionWinRate = { player: 'N/A', rate: 0 };
            let bestHandWinRate = { player: 'N/A', rate: 0 };
            let lowestAvgScore = { player: 'N/A', avg: Infinity };
            let mostFalseLockouts = { player: 'N/A', count: 0 };
            let longestHandStreak = { player: 'N/A', streak: 0 };
            
            for (let playerId in stats) {
                const ps = stats[playerId];
                
                if (ps.sessionsWon > mostSessionsWon.wins) {
                    mostSessionsWon = { player: ps.username, wins: ps.sessionsWon };
                }
                
                if (ps.handsWon > mostHandsWon.hands) {
                    mostHandsWon = { player: ps.username, hands: ps.handsWon };
                }
                
                if (ps.sessionsPlayed > 0) {
                    const sessionWinRate = (ps.sessionsWon / ps.sessionsPlayed) * 100;
                    if (sessionWinRate > bestSessionWinRate.rate) {
                        bestSessionWinRate = { player: ps.username, rate: sessionWinRate.toFixed(1) };
                    }
                }
                
                if (ps.handsPlayed > 0) {
                    const handWinRate = (ps.handsWon / ps.handsPlayed) * 100;
                    if (handWinRate > bestHandWinRate.rate) {
                        bestHandWinRate = { player: ps.username, rate: handWinRate.toFixed(1) };
                    }
                }
                
                if (ps.handsPlayed > 0) {
                    const avgScore = ps.totalScore / ps.handsPlayed;
                    if (avgScore < lowestAvgScore.avg) {
                        lowestAvgScore = { player: ps.username, avg: avgScore.toFixed(2) };
                    }
                }
                
                if (ps.falseLockouts > mostFalseLockouts.count) {
                    mostFalseLockouts = { player: ps.username, count: ps.falseLockouts };
                }
                
                if (ps.maxHandStreak > longestHandStreak.streak) {
                    longestHandStreak = { player: ps.username, streak: ps.maxHandStreak };
                }
            }
            
            let html = '<div class="stats-grid">';
            html += '<div class="stat-card"><h4>Total Sessions</h4><p class="stat-value">' + totalSessions + '</p></div>';
            html += '<div class="stat-card"><h4>Most Sessions Won</h4><p class="stat-value">' + mostSessionsWon.player + '</p><p>' + mostSessionsWon.wins + ' wins</p></div>';
            html += '<div class="stat-card"><h4>Most Hands Won</h4><p class="stat-value">' + mostHandsWon.player + '</p><p>' + mostHandsWon.hands + ' hands</p></div>';
            html += '<div class="stat-card"><h4>Best Session Win Rate</h4><p class="stat-value">' + bestSessionWinRate.player + '</p><p>' + bestSessionWinRate.rate + '%</p></div>';
            html += '<div class="stat-card"><h4>Best Hand Win Rate</h4><p class="stat-value">' + bestHandWinRate.player + '</p><p>' + bestHandWinRate.rate + '%</p></div>';
            html += '<div class="stat-card"><h4>Lowest Avg Score/Hand</h4><p class="stat-value">' + lowestAvgScore.player + '</p><p>' + lowestAvgScore.avg + '</p></div>';
            html += '<div class="stat-card"><h4>Most False Lockouts</h4><p class="stat-value">' + mostFalseLockouts.player + '</p><p>' + mostFalseLockouts.count + ' times</p></div>';
            html += '<div class="stat-card"><h4>Longest Hand Streak</h4><p class="stat-value">' + longestHandStreak.player + '</p><p>' + longestHandStreak.streak + ' hands</p></div>';
            html += '</div>';
            
            html += '<h3 style="margin-top: 30px;">Player Breakdown</h3>';
            html += '<table class="scores-table">';
            html += '<tr><th>Player</th><th>Sessions</th><th>Wins</th><th>Win Rate</th><th>Hands</th><th>Lockouts</th><th>Lockout Rate</th><th>Avg/Hand</th><th>False Lockout Rate</th></tr>';
            
            for (let playerId in stats) {
                const ps = stats[playerId];
                const sessionWinRate = ps.sessionsPlayed > 0 ? ((ps.sessionsWon / ps.sessionsPlayed) * 100).toFixed(1) : '0';
                const lockoutRate = ps.handsPlayed > 0 ? ((ps.handsWon / ps.handsPlayed) * 100).toFixed(1) : '0';
                const avgScore = ps.handsPlayed > 0 ? (ps.totalScore / ps.handsPlayed).toFixed(2) : '0';
                const falseLockoutRate = ps.totalLockouts > 0 ? ((ps.falseLockouts / ps.totalLockouts) * 100).toFixed(1) : '0';
                
                html += '<tr>';
                html += '<td>' + ps.username + '</td>';
                html += '<td>' + ps.sessionsPlayed + '</td>';
                html += '<td>' + ps.sessionsWon + '</td>';
                html += '<td>' + sessionWinRate + '%</td>';
                html += '<td>' + ps.handsPlayed + '</td>';
                html += '<td>' + ps.handsWon + '</td>';
                html += '<td>' + lockoutRate + '%</td>';
                html += '<td>' + avgScore + '</td>';
                html += '<td>' + falseLockoutRate + '%</td>';
                html += '</tr>';
            }
            
            html += '</table>';
            document.getElementById('statsContent').innerHTML = html;
        }

        async function checkActiveSessions() {
            const sessionsData = await apiCall('getSessions', {});
            if (sessionsData.error) return;
            
            const activeSessions = sessionsData.filter(s => !s.date_ended || s.date_ended === '');
            
            if (activeSessions.length > 0) {
                let html = '<div style="background: #e8f5e9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #4caf50;">';
                html += '<h3 style="color: #2e7d32; margin-bottom: 10px;">Active Sessions</h3>';
                
                for (let i = 0; i < activeSessions.length; i++) {
                    const session = activeSessions[i];
                    const handsData = await apiCall('getHands', { session_id: session.session_id });
                    const handCount = handsData.error ? 0 : Math.max(...handsData.map(h => h.hand_number));
                    
                    html += '<div style="background: white; padding: 10px; border-radius: 5px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center;">';
                    html += '<div><strong>' + session.title + '</strong><br><small>' + handCount + ' hands played</small></div>';
                    html += '<button class="btn btn-success btn-small" onclick="resumeSession(' + session.session_id + ')">Resume</button>';
                    html += '</div>';
                }
                
                html += '</div>';
                document.getElementById('activeSessionsSection').innerHTML = html;
            } else {
                document.getElementById('activeSessionsSection').innerHTML = '';
            }
        }

        async function resumeSession(sessionId) {
            const sessionData = await apiCall('getSession', { session_id: sessionId });
            if (sessionData.error) {
                alert('Error loading session: ' + sessionData.error);
                return;
            }
            
            const playersData = await apiCall('getPlayers', {});
            if (playersData.error) {
                alert('Error loading players');
                return;
            }
            
            allPlayers = playersData;
            
            const playerIds = sessionData.players_involved.split(',');
            sessionPlayers = [];
            for (let i = 0; i < playerIds.length; i++) {
                const player = playersData.find(p => String(p.player_id) === String(playerIds[i]));
                if (player) sessionPlayers.push(player);
            }
            
            currentSession = {
                session_id: sessionData.session_id,
                title: sessionData.title,
                host_player_id: sessionData.host_player_id
            };
            
            const handsData = await apiCall('getHands', { session_id: sessionId });
            if (handsData.error || handsData.length === 0) {
                currentHandNumber = 1;
            } else {
                currentHandNumber = Math.max(...handsData.map(h => h.hand_number)) + 1;
            }
            
            showActiveSession();
            updateSessionScores();
        }

        window.addEventListener('DOMContentLoaded', function() {
            console.log('Lockout Tracker v2 loaded');
            checkActiveSessions();
        });

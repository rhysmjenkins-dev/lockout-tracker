<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lockout Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .card { background: white; border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 15px 30px; border-radius: 10px;
            font-size: 1em; cursor: pointer; width: 100%; margin-top: 10px;
            font-weight: 600; transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-secondary { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .btn-success { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .btn-danger { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #555; }
        .hidden { display: none; }
        .screen { display: none; }
        .screen.active { display: block; }
        .player-list { list-style: none; padding: 0; }
        .player-item { padding: 15px; margin: 10px 0; background: #f8f9fa; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .player-item input[type="checkbox"] { width: auto; margin: 0; }
        .hand-input-section { background: #f8f9fa; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .player-hand-row { display: grid; grid-template-columns: 1fr 80px 100px 100px; gap: 10px; align-items: center; padding: 15px; background: white; border-radius: 8px; margin: 10px 0; }
        .player-hand-row label { margin: 0; font-weight: 600; }
        .player-hand-row input[type="number"] { margin: 0; padding: 8px; }
        .checkbox-group { display: flex; gap: 10px; align-items: center; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; margin: 0; font-weight: normal; font-size: 0.9em; }
        .checkbox-group input[type="checkbox"] { width: auto; margin: 0; }
        .game-summary { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .game-summary h3 { margin-bottom: 10px; color: #667eea; }
        .scores-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .scores-table th, .scores-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .scores-table th { background: #667eea; color: white; font-weight: 600; }
        .scores-table tr:hover { background: #f8f9fa; }
        .games-list { list-style: none; padding: 0; }
        .game-item { padding: 15px; margin: 10px 0; background: #f8f9fa; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .game-item:hover { background: #e8e9ff; }
        .game-item-header { font-weight: 600; color: #667eea; margin-bottom: 5px; }
        .game-item-info { font-size: 0.9em; color: #666; }
        .chart-container { position: relative; height: 300px; margin: 20px 0; background: white; padding: 15px; border-radius: 8px; }
        .loading { text-align: center; padding: 20px; color: #667eea; }
        .error { background: #fee; color: #c33; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .success { background: #efe; color: #3c3; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .nav-buttons .btn { flex: 1; }
        @media (max-width: 600px) {
            .header h1 { font-size: 2em; }
            .card { padding: 15px; }
            .player-hand-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎴 Lockout Tracker</h1>
            <p>Track your games, dominate the leaderboard</p>
        </div>
        <div id="homeScreen" class="screen active">
            <div class="card">
                <h2>Welcome!</h2>
                <button class="btn" onclick="showScreen('startSessionScreen')">Start New Session</button>
                <button class="btn btn-secondary" onclick="showScreen('previousGamesScreen'); loadPreviousGames();">View Previous Games</button>
                <button class="btn btn-secondary" onclick="showScreen('leaderboardScreen'); loadLeaderboard();">View Leaderboard</button>
                <button class="btn btn-secondary" onclick="showScreen('statsScreen'); loadStats();">View Stats</button>
                <button class="btn btn-secondary" onclick="showScreen('addPlayerScreen')">Add New Player</button>
            </div>
        </div>

        <div id="addPlayerScreen" class="screen">
            <div class="card">
                <h2>Add New Player</h2>
                <label for="newPlayerName">Player Name</label>
                <input type="text" id="newPlayerName" placeholder="Enter player name">
                <button class="btn btn-success" onclick="addPlayer()">Add Player</button>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Back</button>
                <div id="addPlayerMessage"></div>
            </div>
        </div>

        <div id="startSessionScreen" class="screen">
            <div class="card">
                <h2>Start New Session</h2>
                <label for="sessionTitle">Session Title</label>
                <input type="text" id="sessionTitle" placeholder="e.g. Magaluf 2024">
                
                <label for="sessionHost">Who's hosting?</label>
                <select id="sessionHost">
                    <option value="">Select host...</option>
                </select>
                
                <label>Select Players</label>
                <div id="playerSelectionList" class="loading">Loading players...</div>
                
                <button class="btn btn-success" onclick="createSession()">Start Session</button>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Cancel</button>
                <div id="sessionMessage"></div>
            </div>
        </div>

        <div id="activeSessionScreen" class="screen">
            <div class="card">
                <h2 id="activeSessionTitle">Session Name</h2>
                <div id="activeSessionInfo"></div>
                
                <div id="gameArea" class="hidden">
                    <h3>Game <span id="currentGameNumber"></span></h3>
                    
                    <div class="hand-input-section">
                        <h4>Hand <span id="currentHandNumber"></span></h4>
                        <div id="handInputs"></div>
                        <button class="btn btn-success" onclick="submitHand()">Submit Hand</button>
                        <div id="handMessage"></div>
                    </div>
                    
                    <div id="gameScores" class="game-summary"></div>
                    
                    <button class="btn btn-danger" onclick="endGame()">End Game</button>
                </div>
                
                <div class="nav-buttons">
                    <button class="btn" onclick="startNewGame()" id="newGameBtn">Start New Game</button>
                    <button class="btn btn-danger" onclick="closeSession()">End Session</button>
                </div>
            </div>
        </div>

        <div id="previousGamesScreen" class="screen">
            <div class="card">
                <h2>Previous Games</h2>
                <div id="previousGamesContent" class="loading">Loading...</div>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Back to Home</button>
            </div>
        </div>

        <div id="gameDetailScreen" class="screen">
            <div class="card">
                <h2 id="gameDetailTitle">Game Details</h2>
                <div id="gameDetailContent"></div>
                <div id="gameDetailGraphs"></div>
                <button class="btn btn-secondary" onclick="showScreen('previousGamesScreen'); loadPreviousGames();">Back to Games</button>
            </div>
        </div>

        <div id="leaderboardScreen" class="screen">
            <div class="card">
                <h2>Leaderboard</h2>
                <div id="leaderboardContent" class="loading">Loading...</div>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Back to Home</button>
            </div>
        </div>

        <div id="statsScreen" class="screen">
            <div class="card">
                <h2>Stats</h2>
                <div id="statsContent" class="loading">Loading...</div>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Back to Home</button>
            </div>
        </div>
    </div>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwQ46Q24kOVOlKC2QGwoxBB5WJr4Dpw26TumoAeJi--i2DbemibS07oawvMek9mzmE/exec';

        let currentSession = null;
        let currentGame = null;
        let currentHandNumber = 1;
        let allPlayers = [];
        let sessionPlayers = [];
        let allGames = [];

        async function apiCall(action, params) {
            const url = new URL(API_URL);
            url.searchParams.append('action', action);
            for (let key in params) {
                url.searchParams.append(key, params[key]);
            }
            try {
                const response = await fetch(url);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('API Error:', error);
                return { error: error.message };
            }
        }

        function showScreen(screenId) {
            const screens = document.querySelectorAll('.screen');
            for (let i = 0; i < screens.length; i++) {
                screens[i].classList.remove('active');
            }
            document.getElementById(screenId).classList.add('active');
            if (screenId === 'startSessionScreen') {
                loadPlayersForSession();
            }
        }

        async function loadPlayersForSession() {
            const data = await apiCall('getPlayers', {});
            if (data.error) {
                document.getElementById('playerSelectionList').innerHTML = '<div class="error">Error: ' + data.error + '</div>';
                return;
            }
            allPlayers = data;
            const hostSelect = document.getElementById('sessionHost');
            hostSelect.innerHTML = '<option value="">Select host...</option>';
            for (let i = 0; i < data.length; i++) {
                hostSelect.innerHTML += '<option value="' + data[i].player_id + '">' + data[i].username + '</option>';
            }
            const playerList = document.getElementById('playerSelectionList');
            let html = '<ul class="player-list">';
            for (let i = 0; i < data.length; i++) {
                html += '<li class="player-item"><label><input type="checkbox" value="' + data[i].player_id + '" class="player-checkbox"> ' + data[i].username + '</label></li>';
            }
            html += '</ul>';
            playerList.innerHTML = html;
        }

        async function addPlayer() {
            const username = document.getElementById('newPlayerName').value.trim();
            const messageDiv = document.getElementById('addPlayerMessage');
            if (!username) {
                messageDiv.innerHTML = '<div class="error">Please enter a player name</div>';
                return;
            }
            const data = await apiCall('addPlayer', { username: username, editor_name: username });
            if (data.error) {
                messageDiv.innerHTML = '<div class="error">Error: ' + data.error + '</div>';
            } else {
                messageDiv.innerHTML = '<div class="success">Player added!</div>';
                document.getElementById('newPlayerName').value = '';
                setTimeout(function() { showScreen('homeScreen'); }, 1500);
            }
        }

        async function createSession() {
            const title = document.getElementById('sessionTitle').value.trim();
            const hostId = document.getElementById('sessionHost').value;
            const checkboxes = document.querySelectorAll('.player-checkbox:checked');
            const selectedPlayers = [];
            for (let i = 0; i < checkboxes.length; i++) {
                selectedPlayers.push(checkboxes[i].value);
            }
            const messageDiv = document.getElementById('sessionMessage');
            if (!title || !hostId || selectedPlayers.length === 0) {
                messageDiv.innerHTML = '<div class="error">Please fill all fields</div>';
                return;
            }
            const data = await apiCall('createSession', {
                title: title,
                host_player_id: hostId,
                players_involved: selectedPlayers.join(',')
            });
            if (data.error) {
                messageDiv.innerHTML = '<div class="error">Error: ' + data.error + '</div>';
            } else {
                currentSession = { session_id: data.session_id, title: title, host_player_id: hostId };
                sessionPlayers = [];
                for (let i = 0; i < allPlayers.length; i++) {
                    if (selectedPlayers.indexOf(String(allPlayers[i].player_id)) !== -1) {
                        sessionPlayers.push(allPlayers[i]);
                    }
                }
                showActiveSession();
            }
        }

        function showActiveSession() {
            document.getElementById('activeSessionTitle').textContent = currentSession.title;
            let playerNames = sessionPlayers.map(p => p.username).join(', ');
            document.getElementById('activeSessionInfo').innerHTML = 
                '<p><strong>Session ID:</strong> ' + currentSession.session_id + '</p>' +
                '<p><strong>Players:</strong> ' + playerNames + '</p>';
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('newGameBtn').style.display = 'block';
            showScreen('activeSessionScreen');
        }

        async function closeSession() {
            if (!confirm('End this session?')) return;
            let hostPlayer = allPlayers.find(p => p.player_id == currentSession.host_player_id);
            const data = await apiCall('closeSession', {
                session_id: currentSession.session_id,
                editor_name: hostPlayer ? hostPlayer.username : 'Unknown'
            });
            if (data.error) {
                alert('Error: ' + data.error);
            } else {
                alert('Session closed!');
                currentSession = null;
                currentGame = null;
                showScreen('homeScreen');
            }
        }

        async function startNewGame() {
            let hostPlayer = allPlayers.find(p => p.player_id == currentSession.host_player_id);
            const gamesData = await apiCall('getGames', { session_id: currentSession.session_id });
            const gameNumber = gamesData.length + 1;
            const data = await apiCall('createGame', {
                session_id: currentSession.session_id,
                game_number: gameNumber,
                editor_name: hostPlayer ? hostPlayer.username : 'Unknown'
            });
            if (data.error) {
                alert('Error: ' + data.error);
            } else {
                currentGame = { game_id: data.game_id, game_number: gameNumber };
                currentHandNumber = 1;
                document.getElementById('currentGameNumber').textContent = gameNumber;
                document.getElementById('gameArea').classList.remove('hidden');
                document.getElementById('newGameBtn').style.display = 'none';
                setupHandInputs();
            }
        }

        function setupHandInputs() {
            document.getElementById('currentHandNumber').textContent = currentHandNumber;
            document.getElementById('handMessage').innerHTML = '';
            const handInputs = document.getElementById('handInputs');
            let html = '';
            for (let i = 0; i < sessionPlayers.length; i++) {
                const player = sessionPlayers[i];
                html += '<div class="player-hand-row">' +
                    '<label>' + player.username + '</label>' +
                    '<input type="number" id="score_' + player.player_id + '" placeholder="Score">' +
                    '<div class="checkbox-group"><label><input type="checkbox" id="lockout_' + player.player_id + '" onchange="handleLockoutChange(' + player.player_id + ')"> Locked Out</label></div>' +
                    '<div class="checkbox-group"><label><input type="checkbox" id="false_' + player.player_id + '" disabled> False</label></div>' +
                    '</div>';
            }
            handInputs.innerHTML = html;
        }

        function handleLockoutChange(playerId) {
            const checkboxes = document.querySelectorAll('[id^="lockout_"]');
            for (let i = 0; i < checkboxes.length; i++) {
                const cb = checkboxes[i];
                const pId = cb.id.replace('lockout_', '');
                const falseCheckbox = document.getElementById('false_' + pId);
                if (cb.checked) {
                    if (pId != playerId) {
                        cb.checked = false;
                    } else {
                        falseCheckbox.disabled = false;
                    }
                } else {
                    falseCheckbox.disabled = true;
                    falseCheckbox.checked = false;
                }
            }
        }
        async function submitHand() {
            const messageDiv = document.getElementById('handMessage');
            const scores = [];
            let lockoutPlayerId = null;
            let falseLockout = false;
            
            for (let i = 0; i < sessionPlayers.length; i++) {
                const player = sessionPlayers[i];
                const scoreVal = parseInt(document.getElementById('score_' + player.player_id).value);
                if (isNaN(scoreVal)) {
                    messageDiv.innerHTML = '<div class="error">Please enter all scores</div>';
                    return;
                }
                scores.push({ player_id: player.player_id, score: scoreVal });
                const isLockedOut = document.getElementById('lockout_' + player.player_id).checked;
                if (isLockedOut) {
                    lockoutPlayerId = player.player_id;
                    falseLockout = document.getElementById('false_' + player.player_id).checked;
                }
            }
            
            if (lockoutPlayerId === null) {
                messageDiv.innerHTML = '<div class="error">One player must lock out</div>';
                return;
            }
            
            let hostPlayer = allPlayers.find(p => p.player_id == currentSession.host_player_id);
            const data = await apiCall('addHand', {
                game_id: currentGame.game_id,
                hand_number: currentHandNumber,
                scores: JSON.stringify(scores),
                lockout_player_id: lockoutPlayerId,
                false_lockout: falseLockout,
                editor_name: hostPlayer ? hostPlayer.username : 'Unknown'
            });
            
            if (data.error) {
                messageDiv.innerHTML = '<div class="error">Error: ' + data.error + '</div>';
            } else {
                currentHandNumber++;
                setupHandInputs();
                updateGameScores();
            }
        }

        async function updateGameScores() {
            const handsData = await apiCall('getHands', { game_id: currentGame.game_id });
            if (handsData.error) return;
            
            const playerScores = {};
            for (let i = 0; i < sessionPlayers.length; i++) {
                const player = sessionPlayers[i];
                playerScores[player.player_id] = { username: player.username, total: 0, hands: [] };
            }
            
            for (let i = 0; i < handsData.length; i++) {
                const hand = handsData[i];
                if (playerScores[hand.player_id]) {
                    playerScores[hand.player_id].total += Number(hand.score);
                    playerScores[hand.player_id].hands.push({ hand_number: hand.hand_number, score: hand.score });
                }
            }
            
            const scores = Object.values(playerScores).sort((a, b) => a.total - b.total);
            let html = '<h3>Current Scores</h3><table class="scores-table"><tr><th>Player</th><th>Total</th><th>Details</th></tr>';
            for (let i = 0; i < scores.length; i++) {
                const p = scores[i];
                let handDetails = p.hands.map(h => 'H' + h.hand_number + ': ' + h.score).join(' ');
                html += '<tr><td>' + p.username + '</td><td>' + p.total + '</td><td><small>' + handDetails + '</small></td></tr>';
            }
            html += '</table>';
            document.getElementById('gameScores').innerHTML = html;
        }

        async function endGame() {
            if (!confirm('End this game?')) return;
            let hostPlayer = allPlayers.find(p => p.player_id == currentSession.host_player_id);
            const data = await apiCall('closeGame', {
                game_id: currentGame.game_id,
                editor_name: hostPlayer ? hostPlayer.username : 'Unknown'
            });
            if (data.error) {
                alert('Error: ' + data.error);
            } else {
                alert('Game ended!');
                document.getElementById('gameArea').classList.add('hidden');
                document.getElementById('newGameBtn').style.display = 'block';
                currentGame = null;
            }
        }

        async function loadPreviousGames() {
            const contentDiv = document.getElementById('previousGamesContent');
            contentDiv.innerHTML = '<div class="loading">Loading games...</div>';
            
            const sessionsData = await apiCall('getSessions', {});
            if (sessionsData.error) {
                contentDiv.innerHTML = '<div class="error">Error loading games</div>';
                return;
            }
            
            allGames = [];
            let html = '<ul class="games-list">';
            
            for (let s = 0; s < sessionsData.length; s++) {
                const session = sessionsData[s];
                const gamesData = await apiCall('getGames', { session_id: session.session_id });
                if (gamesData.error) continue;
                for (let g = 0; g < gamesData.length; g++) {
                    const game = gamesData[g];
                    allGames.push({
                        game_id: game.game_id,
                        session_id: session.session_id,
                        session_title: session.title,
                        game_number: game.game_number,
                        date: session.date_started
                    });
                }
            }
            
            for (let i = 0; i < allGames.length; i++) {
                const game = allGames[i];
                html += '<li class="game-item" onclick="viewGameDetail(' + i + ')">' +
                    '<div class="game-item-header">' + game.session_title + ' - Game ' + game.game_number + '</div>' +
                    '<div class="game-item-info">Date: ' + game.date + '</div>' +
                    '</li>';
            }
            
            html += '</ul>';
            contentDiv.innerHTML = html;
        }

        function getPlayerName(playerId) {
            for (let i = 0; i < allPlayers.length; i++) {
                if (allPlayers[i].player_id == playerId) {
                    return allPlayers[i].username;
                }
            }
            return 'Unknown';
        }
        async function viewGameDetail(gameIndex) {
            const game = allGames[gameIndex];
            const handsData = await apiCall('getHands', { game_id: game.game_id });
            
            if (handsData.error) {
                alert('Error loading game details');
                return;
            }
            
            document.getElementById('gameDetailTitle').textContent = game.session_title + ' - Game ' + game.game_number;
            
            const playerTotals = {};
            const playerHands = {};
            
            for (let i = 0; i < handsData.length; i++) {
                const hand = handsData[i];
                if (!playerTotals[hand.player_id]) {
                    playerTotals[hand.player_id] = 0;
                    playerHands[hand.player_id] = [];
                }
                playerTotals[hand.player_id] += Number(hand.score);
                playerHands[hand.player_id].push(Number(hand.score));
            }
            
            let html = '<h3>Final Scores</h3><table class="scores-table"><tr><th>Player</th><th>Total</th></tr>';
            const sortedPlayers = Object.keys(playerTotals).sort(function(a, b) {
                return playerTotals[a] - playerTotals[b];
            });
            
            for (let i = 0; i < sortedPlayers.length; i++) {
                const playerId = sortedPlayers[i];
                const playerName = getPlayerName(playerId);
                html += '<tr><td>' + playerName + '</td><td>' + playerTotals[playerId] + '</td></tr>';
            }
            html += '</table>';
            
            document.getElementById('gameDetailContent').innerHTML = html;
            
            let graphsHtml = '<h3>Graphs</h3>';
            graphsHtml += '<div class="chart-container"><canvas id="wormChart"></canvas></div>';
            graphsHtml += '<div class="chart-container"><canvas id="manhattanChart"></canvas></div>';
            
            document.getElementById('gameDetailGraphs').innerHTML = graphsHtml;
            
            showScreen('gameDetailScreen');
            
            setTimeout(function() {
                drawGameWormChart(playerHands, sortedPlayers);
                drawGameManhattanChart(playerHands, sortedPlayers);
            }, 100);
        }

        function drawGameWormChart(playerHands, playerIds) {
            const ctx = document.getElementById('wormChart');
            if (!ctx) return;
            const datasets = [];
            const colors = ['#667eea', '#f5576c', '#4facfe', '#00f2fe', '#fa709a'];
            
            for (let i = 0; i < playerIds.length; i++) {
                const playerId = playerIds[i];
                const hands = playerHands[playerId];
                let cumulative = 0;
                const cumulativeScores = [];
                
                for (let j = 0; j < hands.length; j++) {
                    cumulative += hands[j];
                    cumulativeScores.push(cumulative);
                }
                
                datasets.push({
                    label: getPlayerName(playerId),
                    data: cumulativeScores,
                    borderColor: colors[i % colors.length],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    tension: 0.1
                });
            }
            
            const maxHands = Math.max.apply(null, Object.keys(playerHands).map(k => playerHands[k].length));
            const labels = [];
            for (let i = 1; i <= maxHands; i++) {
                labels.push('Hand ' + i);
            }
            
            new Chart(ctx.getContext('2d'), {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: 'Cricket Worm - Cumulative Scores' }
                    },
                    scales: {
                        y: { title: { display: true, text: 'Cumulative Score' } }
                    }
                }
            });
        }

        function drawGameManhattanChart(playerHands, playerIds) {
            const ctx = document.getElementById('manhattanChart');
            if (!ctx) return;
            const datasets = [];
            const colors = ['#667eea', '#f5576c', '#4facfe', '#00f2fe', '#fa709a'];
            const maxHands = Math.max.apply(null, Object.keys(playerHands).map(k => playerHands[k].length));
            
            for (let i = 0; i < playerIds.length; i++) {
                const playerId = playerIds[i];
                const hands = playerHands[playerId];
                const paddedHands = [];
                for (let j = 0; j < maxHands; j++) {
                    paddedHands.push(hands[j] || 0);
                }
                datasets.push({
                    label: getPlayerName(playerId),
                    data: paddedHands,
                    backgroundColor: colors[i % colors.length],
                    borderColor: colors[i % colors.length],
                    borderWidth: 1
                });
            }
            
            const labels = [];
            for (let i = 1; i <= maxHands; i++) {
                labels.push('Hand ' + i);
            }
            
            new Chart(ctx.getContext('2d'), {
                type: 'bar',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: 'Manhattan - Per Hand Scores' }
                    },
                    scales: { y: { stacked: false } }
                }
            });
        }

        async function loadStatsData(sessionsData, playersData) {
            const selectedPlayers = getSelectedPlayers();

        async function loadAllTimeStats(sessionsData, playersData, selectedPlayers) {
            const allGamesData = [];
            
            for (let s = 0; s < sessionsData.length; s++) {
                const session = sessionsData[s];
                const gamesData = await apiCall('getGames', { session_id: session.session_id });
                if (gamesData.error) continue;
                for (let g = 0; g < gamesData.length; g++) {
                    const game = gamesData[g];
                    const handsData = await apiCall('getHands', { game_id: game.game_id });
                    if (!handsData.error) {
                        allGamesData.push({
                            game_id: game.game_id,
                            session_title: session.title,
                            hands: handsData
                        });
                    }
                }
            }
            
            const stats = calculateAllTimeStats(allGamesData, selectedPlayers, playersData);
            displayAllTimeStats(stats, selectedPlayers, playersData, allGamesData);
        }

        function calculateAllTimeStats(allGamesData, selectedPlayers, playersData) {
            const playerStats = {};
            
            for (let i = 0; i < selectedPlayers.length; i++) {
                const playerId = selectedPlayers[i];
                playerStats[playerId] = {
                    username: getPlayerNameById(playerId, playersData),
                    wins: 0,
                    losses: 0,
                    totalScore: 0,
                    handCount: 0,
                    lockoutScores: [],
                    falseLockouts: 0,
                    totalLockouts: 0,
                    gamesPlayed: 0,
                    gameScores: [],
                    winStreak: 0,
                    lossStreak: 0,
                    maxWinStreak: 0,
                    maxLossStreak: 0,
                    bestMargin: 0,
                    worstMargin: 0
                };
            }
            
            for (let g = 0; g < allGamesData.length; g++) {
                const game = allGamesData[g];
                const playerTotals = {};
                
                for (let i = 0; i < selectedPlayers.length; i++) {
                    playerTotals[selectedPlayers[i]] = 0;
                }
                
                for (let h = 0; h < game.hands.length; h++) {
                    const hand = game.hands[h];
                    if (selectedPlayers.indexOf(String(hand.player_id)) !== -1) {
                        playerTotals[hand.player_id] += Number(hand.score);
                        playerStats[hand.player_id].totalScore += Number(hand.score);
                        playerStats[hand.player_id].handCount++;
                        
                        if (hand.lockout_player_id) {
                            playerStats[hand.player_id].totalLockouts++;
                            if (String(hand.lockout_player_id) === String(hand.player_id)) {
                                playerStats[hand.player_id].lockoutScores.push(playerTotals[hand.player_id]);
                                if (hand.false_lockout) {
                                    playerStats[hand.player_id].falseLockouts++;
                                }
                            }
                        }
                    }
                }
                
                let winnerPlayerId = null;
                let lowestScore = Infinity;
                let secondLowestScore = Infinity;
                
                for (let playerId in playerTotals) {
                    if (selectedPlayers.indexOf(String(playerId)) !== -1) {
                        const score = playerTotals[playerId];
                        if (score < lowestScore) {
                            secondLowestScore = lowestScore;
                            lowestScore = score;
                            winnerPlayerId = playerId;
                        } else if (score < secondLowestScore) {
                            secondLowestScore = score;
                        }
                    }
                }
                
                for (let i = 0; i < selectedPlayers.length; i++) {
                    const playerId = selectedPlayers[i];
                    if (playerTotals[playerId] !== undefined) {
                        playerStats[playerId].gamesPlayed++;
                        playerStats[playerId].gameScores.push(playerTotals[playerId]);
                        
                        if (String(playerId) === String(winnerPlayerId)) {
                            playerStats[playerId].wins++;
                            playerStats[playerId].winStreak++;
                            playerStats[playerId].lossStreak = 0;
                            if (playerStats[playerId].winStreak > playerStats[playerId].maxWinStreak) {
                                playerStats[playerId].maxWinStreak = playerStats[playerId].winStreak;
                            }
                            const margin = secondLowestScore - lowestScore;
                            if (margin > playerStats[playerId].bestMargin) {
                                playerStats[playerId].bestMargin = margin;
                            }
                        } else {
                            playerStats[playerId].losses++;
                            playerStats[playerId].lossStreak++;
                            playerStats[playerId].winStreak = 0;
                            if (playerStats[playerId].lossStreak > playerStats[playerId].maxLossStreak) {
                                playerStats[playerId].maxLossStreak = playerStats[playerId].lossStreak;
                            }
                            const margin = playerTotals[playerId] - lowestScore;
                            if (margin > playerStats[playerId].worstMargin) {
                                playerStats[playerId].worstMargin = margin;
                            }
                        }
                    }
                }
            }
            
            return playerStats;
        }

        function displayAllTimeStats(stats, selectedPlayers, playersData, allGamesData) {
            let html = '<h3>Overall Stats</h3><div class="stats-grid">';
            
            for (let i = 0; i < selectedPlayers.length; i++) {
                const playerId = selectedPlayers[i];
                const ps = stats[playerId];
                
                const winRate = ps.gamesPlayed > 0 ? ((ps.wins / ps.gamesPlayed) * 100).toFixed(1) : '0';
                const avgScorePerHand = ps.handCount > 0 ? (ps.totalScore / ps.handCount).toFixed(2) : '0';
                const avgLockoutScore = ps.lockoutScores.length > 0 ? (ps.lockoutScores.reduce((a, b) => a + b, 0) / ps.lockoutScores.length).toFixed(2) : '0';
                const falseLockoutRate = ps.totalLockouts > 0 ? ((ps.falseLockouts / ps.totalLockouts) * 100).toFixed(1) : '0';
                
                html += '<div class="stat-card"><h4>' + ps.username + '</h4>';
                html += '<p><strong>Win Rate:</strong> ' + winRate + '%</p>';
                html += '<p><strong>Avg Score/Hand:</strong> ' + avgScorePerHand + '</p>';
                html += '<p><strong>Avg Lockout Score:</strong> ' + avgLockoutScore + '</p>';
                html += '<p><strong>False Lockout %:</strong> ' + falseLockoutRate + '%</p>';
                html += '<p><strong>Win Streak:</strong> ' + ps.maxWinStreak + '</p>';
                html += '<p><strong>Loss Streak:</strong> ' + ps.maxLossStreak + '</p>';
                html += '<p><strong>Best Margin:</strong> ' + ps.bestMargin + '</p>';
                html += '<p><strong>Worst Margin:</strong> ' + ps.worstMargin + '</p>';
                html += '</div>';
            }
            
            html += '</div>';
            document.getElementById('statsCardsContainer').innerHTML = html;
            
            let graphsHtml = '<h3>Graphs</h3>';
            graphsHtml += '<div class="chart-container"><canvas id="allTimeWormChart"></canvas></div>';
            graphsHtml += '<div class="chart-container"><canvas id="allTimeManhattanChart"></canvas></div>';
            document.getElementById('statsGraphsContainer').innerHTML = graphsHtml;
            
            setTimeout(function() {
                drawAllTimeWormChart(allGamesData, selectedPlayers, playersData);
                drawAllTimeManhattanChart(allGamesData, selectedPlayers, playersData);
            }, 100);
        }

        async function loadGameStats(sessionsData, playersData, selectedPlayers) {
            const gameSelectValue = document.getElementById('statsGameSelect').value;
            if (!gameSelectValue) {
                document.getElementById('statsCardsContainer').innerHTML = '<div class="error">Please select a game</div>';
                return;
            }
            
            let gameIndex = 0;
            let targetGame = null;
            
            for (let s = 0; s < sessionsData.length; s++) {
                const session = sessionsData[s];
                const gamesData = await apiCall('getGames', { session_id: session.session_id });
                if (gamesData.error) continue;
                for (let g = 0; g < gamesData.length; g++) {
                    if (gameIndex === parseInt(gameSelectValue)) {
                        targetGame = { game_id: gamesData[g].game_id, session_title: session.title, game_number: gamesData[g].game_number };
                        break;
                    }
                    gameIndex++;
                }
                if (targetGame) break;
            }
            
            if (!targetGame) {
                document.getElementById('statsCardsContainer').innerHTML = '<div class="error">Game not found</div>';
                return;
            }
            
            const handsData = await apiCall('getHands', { game_id: targetGame.game_id });
            if (handsData.error) {
                document.getElementById('statsCardsContainer').innerHTML = '<div class="error">Error loading game data</div>';
                return;
            }
            
            displayGameStats(targetGame, handsData, selectedPlayers, playersData);
        }

        function displayGameStats(game, handsData, selectedPlayers, playersData) {
            const playerStats = {};
            const playerHands = {};
            
            for (let i = 0; i < selectedPlayers.length; i++) {
                const playerId = selectedPlayers[i];
                playerStats[playerId] = {
                    username: getPlayerNameById(playerId, playersData),
                    total: 0,
                    lockouts: 0,
                    falseLockouts: 0,
                    lockoutScores: []
                };
                playerHands[playerId] = [];
            }
            
            for (let h = 0; h < handsData.length; h++) {
                const hand = handsData[h];
                if (selectedPlayers.indexOf(String(hand.player_id)) !== -1) {
                    const score = Number(hand.score);
                    playerStats[hand.player_id].total += score;
                    playerHands[hand.player_id].push(score);
                    
                    if (hand.lockout_player_id && String(hand.lockout_player_id) === String(hand.player_id)) {
                        playerStats[hand.player_id].lockouts++;
                        playerStats[hand.player_id].lockoutScores.push(playerStats[hand.player_id].total);
                        if (hand.false_lockout) {
                            playerStats[hand.player_id].falseLockouts++;
                        }
                    }
                }
            }
            
            let html = '<h3>' + game.session_title + ' - Game ' + game.game_number + '</h3>';
            html += '<h4>Final Scores</h4><table class="scores-table"><tr><th>Player</th><th>Total</th><th>Avg/Hand</th><th>Lockouts</th><th>False</th></tr>';
            
            const sortedPlayers = selectedPlayers.sort(function(a, b) {
                return playerStats[a].total - playerStats[b].total;
            });
            
            for (let i = 0; i < sortedPlayers.length; i++) {
                const playerId = sortedPlayers[i];
                const ps = playerStats[playerId];
                const avgPerHand = playerHands[playerId].length > 0 ? (ps.total / playerHands[playerId].length).toFixed(2) : '0';
                html += '<tr><td>' + ps.username + '</td><td>' + ps.total + '</td><td>' + avgPerHand + '</td><td>' + ps.lockouts + '</td><td>' + ps.falseLockouts + '</td></tr>';
            }
            
            html += '</table>';
            document.getElementById('statsCardsContainer').innerHTML = html;
            
            let graphsHtml = '<h3>Graphs</h3>';
            graphsHtml += '<div class="chart-container"><canvas id="gameWormChart"></canvas></div>';
            graphsHtml += '<div class="chart-container"><canvas id="gameManhattanChart"></canvas></div>';
            document.getElementById('statsGraphsContainer').innerHTML = graphsHtml;
            
            setTimeout(function() {
                drawGameWormChart(playerHands, sortedPlayers, playersData);
                drawGameManhattanChart(playerHands, sortedPlayers, playersData);
            }, 100);
        }

        function getPlayerNameById(playerId, playersData) {
            for (let i = 0; i < playersData.length; i++) {
                if (playersData[i].player_id == playerId) {
                    return playersData[i].username;
                }
            }
            return 'Unknown';
        }

        function drawAllTimeWormChart(allGamesData, selectedPlayers, playersData) {
            const ctx = document.getElementById('allTimeWormChart');
            if (!ctx) return;
            
            const playerCumulative = {};
            for (let i = 0; i < selectedPlayers.length; i++) {
                playerCumulative[selectedPlayers[i]] = [];
            }
            
            let cumulative = {};
            for (let i = 0; i < selectedPlayers.length; i++) {
                cumulative[selectedPlayers[i]] = 0;
            }
            
            for (let g = 0; g < allGamesData.length; g++) {
                const game = allGamesData[g];
                const playerTotals = {};
                for (let i = 0; i < selectedPlayers.length; i++) {
                    playerTotals[selectedPlayers[i]] = 0;
                }
                
                for (let h = 0; h < game.hands.length; h++) {
                    const hand = game.hands[h];
                    if (selectedPlayers.indexOf(String(hand.player_id)) !== -1) {
                        playerTotals[hand.player_id] += Number(hand.score);
                    }
                }
                
                for (let i = 0; i < selectedPlayers.length; i++) {
                    const playerId = selectedPlayers[i];
                    if (playerTotals[playerId] > 0) {
                        cumulative[playerId] += playerTotals[playerId];
                        playerCumulative[playerId].push(cumulative[playerId]);
                    } else {
                        playerCumulative[playerId].push(null);
                    }
                }
            }
            
            const datasets = [];
            const colors = ['#667eea', '#f5576c', '#4facfe', '#00f2fe', '#fa709a'];
            
            for (let i = 0; i < selectedPlayers.length; i++) {
                const playerId = selectedPlayers[i];
                datasets.push({
                    label: getPlayerNameById(playerId, playersData),
                    data: playerCumulative[playerId],
                    borderColor: colors[i % colors.length],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    tension: 0.1,
                    spanGaps: false
                });
            }
            
            const labels = [];
            for (let i = 1; i <= allGamesData.length; i++) {
                labels.push('Game ' + i);
            }
            
            new Chart(ctx.getContext('2d'), {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: 'Cricket Worm - All Time Cumulative Scores' },
                        legend: { display: true }
                    },
                    scales: { y: { title: { display: true, text: 'Cumulative Score' } } }
                }
            });
        }

        function drawAllTimeManhattanChart(allGamesData, selectedPlayers, playersData) {

            const playerScores = {};
            for (let i = 0; i < selectedPlayers.length; i++) {
                playerScores[selectedPlayers[i]] = [];

            for (let g = 0; g < allGamesData.length; g++) {
                const game = allGamesData[g];

                for (let i = 0; i < selectedPlayers.length; i++) {
                    playerTotals[selectedPlayers[i]] = 0;
                }
                
                for (let h = 0; h < game.hands.length; h++) {
                    const hand = game.hands[h];
                    if (selectedPlayers.indexOf(String(hand.player_id)) !== -1) {
                        playerTotals[hand.player_id] += Number(hand.score);
                    }
                }
                
                for (let i = 0; i < selectedPlayers.length; i++) {
                    const playerId = selectedPlayers[i];

            new Chart(ctx.getContext('2d'), {

        function drawGameWormChart(playerHands, playerIds, playersData) {
            const ctx = document.getElementById('gameWormChart');
            if (!ctx) return;
            
            const datasets = [];
            const colors = ['#667eea', '#f5576c', '#4facfe', '#00f2fe', '#fa709a'];
            
            for (let i = 0; i < playerIds.length; i++) {
                const playerId = playerIds[i];
                const hands = playerHands[playerId];
                let cumulative = 0;
                const cumulativeScores = [];
                
                for (let j = 0; j < hands.length; j++) {
                    cumulative += hands[j];
                    cumulativeScores.push(cumulative);
                }
                
                datasets.push({
                    label: getPlayerNameById(playerId, playersData),
                    data: cumulativeScores,
                    borderColor: colors[i % colors.length],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    tension: 0.1
                });
            }
            
            const maxHands = Math.max.apply(null, playerIds.map(id => playerHands[id].length));
            const labels = [];
            for (let i = 1; i <= maxHands; i++) {
                labels.push('Hand ' + i);
            }
            
            new Chart(ctx.getContext('2d'), {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: 'Cricket Worm - Game Cumulative Scores' }
                    },
                    scales: { y: { title: { display: true, text: 'Cumulative Score' } } }
                }
            });
        }

        function drawGameManhattanChart(playerHands, playerIds, playersData) {
            const ctx = document.getElementById('gameManhattanChart');
            if (!ctx) return;
            
            const datasets = [];
            const colors = ['#667eea', '#f5576c', '#4facfe', '#00f2fe', '#fa709a'];
            const maxHands = Math.max.apply(null, playerIds.map(id => playerHands[id].length));
            
            for (let i = 0; i < playerIds.length; i++) {
                const playerId = playerIds[i];
                const hands = playerHands[playerId];
                const paddedHands = [];
                for (let j = 0; j < maxHands; j++) {

            const labels = [];

                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: 'Manhattan - Game Per Hand Scores' }
                    },

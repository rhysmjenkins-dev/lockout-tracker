<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lockout Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 0.9em;
            margin: 5px 0;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            color: #555;
        }

        .hidden {
            display: none;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .player-list {
            list-style: none;
            padding: 0;
        }

        .player-item {
            padding: 15px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-item input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .hand-input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .player-hand-row {
            display: grid;
            grid-template-columns: 1fr 80px 100px 100px;
            gap: 10px;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
        }

        .player-hand-row label {
            margin: 0;
            font-weight: 600;
        }

        .player-hand-row input[type="number"] {
            margin: 0;
            padding: 8px;
        }

        .checkbox-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 0;
            font-weight: normal;
            font-size: 0.9em;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
            padding: 0;
        }

        .game-summary {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .game-summary h3 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .scores-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .scores-table th,
        .scores-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .scores-table th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        .scores-table tr:hover {
            background: #f8f9fa;
        }

        .hand-breakdown {
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .hand-breakdown-row {
            padding: 5px 0;
            display: flex;
            justify-content: space-between;
        }

        .lockout-indicator {
            display: inline-block;
            margin-left: 5px;
        }

        .false-lockout {
            color: #f5576c;
            font-weight: bold;
        }

        .correct-lockout {
            color: #4facfe;
            font-weight: bold;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .leaderboard-table th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        .leaderboard-table tr:hover {
            background: #f8f9fa;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .nav-buttons .btn {
            flex: 1;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2em;
            }
            
            .card {
                padding: 15px;
            }
            
            .btn {
                padding: 12px 20px;
            }

            .player-hand-row {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎴 Lockout Tracker</h1>
            <p>Track your games, dominate the leaderboard</p>
        </div>

        <div id="homeScreen" class="screen active">
            <div class="card">
                <h2>Welcome!</h2>
                <button class="btn" onclick="showScreen('startSessionScreen')">Start New Session</button>
                <button class="btn btn-secondary" onclick="showScreen('leaderboardScreen'); loadLeaderboard();">View Leaderboard</button>
                <button class="btn btn-secondary" onclick="showScreen('statsScreen'); loadStats();">View Stats</button>
                <button class="btn btn-secondary" onclick="showScreen('addPlayerScreen')">Add New Player</button>
            </div>
        </div>

        <div id="addPlayerScreen" class="screen">
            <div class="card">
                <h2>Add New Player</h2>
                <label for="newPlayerName">Player Name</label>
                <input type="text" id="newPlayerName" placeholder="Enter player name">
                <button class="btn btn-success" onclick="addPlayer()">Add Player</button>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Back</button>
                <div id="addPlayerMessage"></div>
            </div>
        </div>

        <div id="startSessionScreen" class="screen">
            <div class="card">
                <h2>Start New Session</h2>
                <label for="sessionTitle">Session Title</label>
                <input type="text" id="sessionTitle" placeholder="e.g. Magaluf 2024">
                
                <label for="sessionHost">Who's hosting?</label>
                <select id="sessionHost">
                    <option value="">Select host...</option>
                </select>
                
                <label>Select Players</label>
                <div id="playerSelectionList" class="loading">Loading players...</div>
                
                <button class="btn btn-success" onclick="createSession()">Start Session</button>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Cancel</button>
                <div id="sessionMessage"></div>
            </div>
        </div>

        <div id="activeSessionScreen" class="screen">
            <div class="card">
                <h2 id="activeSessionTitle">Session Name</h2>
                <div id="activeSessionInfo"></div>
                
                <div id="gameArea" class="hidden">
                    <h3>Game <span id="currentGameNumber"></span></h3>
                    
                    <div class="hand-input-section">
                        <h4>Hand <span id="currentHandNumber"></span></h4>
                        <div id="handInputs"></div>
                        <button class="btn btn-success" onclick="submitHand()">Submit Hand</button>
                        <div id="handMessage"></div>
                    </div>
                    
                    <div id="gameScores" class="game-summary"></div>
                    
                    <button class="btn btn-danger" onclick="endGame()">End Game</button>
                </div>
                
                <div class="nav-buttons">
                    <button class="btn" onclick="startNewGame()" id="newGameBtn">Start New Game</button>
                    <button class="btn btn-danger" onclick="closeSession()">End Session</button>
                </div>
            </div>
        </div>

        <div id="leaderboardScreen" class="screen">
            <div class="card">
                <h2>Leaderboard</h2>
                <div id="leaderboardContent" class="loading">Loading...</div>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Back to Home</button>
            </div>
        </div>

        <div id="statsScreen" class="screen">
            <div class="card">
                <h2>Stats</h2>
                <div id="statsContent" class="loading">Loading...</div>
                <button class="btn btn-secondary" onclick="showScreen('homeScreen')">Back to Home</button>
            </div>
        </div>
    </div>
        <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwv-cqwE5fgZj5gjR7oW6YDgF6uTvOqfnGaU1alCfFhG6xzwqRu2j6HDfgJ5VD_AuRI/exec';

        let currentSession = null;
        let currentGame = null;
        let currentHandNumber = 1;
        let allPlayers = [];
        let sessionPlayers = [];
        let gameHands = [];

        async function apiCall(action, params) {
            const url = new URL(API_URL);
            url.searchParams.append('action', action);
            for (let key in params) {
                url.searchParams.append(key, params[key]);
            }
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('API Error:', error);
                return { error: error.message };
            }
        }

        function showScreen(screenId) {
            const screens = document.querySelectorAll('.screen');
            for (let i = 0; i < screens.length; i++) {
                screens[i].classList.remove('active');
            }
            document.getElementById(screenId).classList.add('active');
            
            if (screenId === 'startSessionScreen') {
                loadPlayersForSession();
            }
        }

        async function loadPlayersForSession() {
            const data = await apiCall('getPlayers', {});
            if (data.error) {
                document.getElementById('playerSelectionList').innerHTML = '<div class="error">Error loading players: ' + data.error + '</div>';
                return;
            }
            
            allPlayers = data;
            
            const hostSelect = document.getElementById('sessionHost');
            hostSelect.innerHTML = '<option value="">Select host...</option>';
            for (let i = 0; i < data.length; i++) {
                const player = data[i];
                hostSelect.innerHTML += '<option value="' + player.player_id + '">' + player.username + '</option>';
            }
            
            const playerList = document.getElementById('playerSelectionList');
            let html = '<ul class="player-list">';
            for (let i = 0; i < data.length; i++) {
                const player = data[i];
                html += '<li class="player-item"><label><input type="checkbox" value="' + player.player_id + '" class="player-checkbox"> ' + player.username + '</label></li>';
            }
            html += '</ul>';
            playerList.innerHTML = html;
        }

        async function addPlayer() {
            const username = document.getElementById('newPlayerName').value.trim();
            const messageDiv = document.getElementById('addPlayerMessage');
            
            if (!username) {
                messageDiv.innerHTML = '<div class="error">Please enter a player name</div>';
                return;
            }
            
            const data = await apiCall('addPlayer', { 
                username: username,
                editor_name: username
            });
            
            if (data.error) {
                messageDiv.innerHTML = '<div class="error">Error: ' + data.error + '</div>';
            } else {
                messageDiv.innerHTML = '<div class="success">Player "' + username + '" added successfully!</div>';
                document.getElementById('newPlayerName').value = '';
                setTimeout(function() {
                    showScreen('homeScreen');
                }, 1500);
            }
        }

        async function createSession() {
            const title = document.getElementById('sessionTitle').value.trim();
            const hostId = document.getElementById('sessionHost').value;
            const checkboxes = document.querySelectorAll('.player-checkbox:checked');
            const selectedPlayers = [];
            for (let i = 0; i < checkboxes.length; i++) {
                selectedPlayers.push(checkboxes[i].value);
            }
            const messageDiv = document.getElementById('sessionMessage');
            
            if (!title || !hostId || selectedPlayers.length === 0) {
                messageDiv.innerHTML = '<div class="error">Please fill in all fields and select at least one player</div>';
                return;
            }
            
            const data = await apiCall('createSession', {
                title: title,
                host_player_id: hostId,
                players_involved: selectedPlayers.join(',')
            });
            
            if (data.error) {
                messageDiv.innerHTML = '<div class="error">Error: ' + data.error + '</div>';
            } else {
                currentSession = {
                    session_id: data.session_id,
                    title: title,
                    host_player_id: hostId
                };
                sessionPlayers = [];
                for (let i = 0; i < allPlayers.length; i++) {
                    const p = allPlayers[i];
                    if (selectedPlayers.indexOf(String(p.player_id)) !== -1) {
                        sessionPlayers.push(p);
                    }
                }
                showActiveSession();
            }
        }

        function showActiveSession() {
            document.getElementById('activeSessionTitle').textContent = currentSession.title;
            let playerNames = '';
            for (let i = 0; i < sessionPlayers.length; i++) {
                if (i > 0) playerNames += ', ';
                playerNames += sessionPlayers[i].username;
            }
            document.getElementById('activeSessionInfo').innerHTML = 
                '<p><strong>Session ID:</strong> ' + currentSession.session_id + '</p>' +
                '<p><strong>Players:</strong> ' + playerNames + '</p>';
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('newGameBtn').style.display = 'block';
            showScreen('activeSessionScreen');
        }

        async function closeSession() {
            if (!confirm('Are you sure you want to end this session?')) return;
            
            let hostPlayer = null;
            for (let i = 0; i < allPlayers.length; i++) {
                if (allPlayers[i].player_id == currentSession.host_player_id) {
                    hostPlayer = allPlayers[i];
                    break;
                }
            }
            
            const data = await apiCall('closeSession', {
                session_id: currentSession.session_id,
                editor_name: hostPlayer ? hostPlayer.username : 'Unknown'
            });
            
            if (data.error) {
                alert('Error closing session: ' + data.error);
            } else {
                alert('Session closed successfully!');
                currentSession = null;
                currentGame = null;
                showScreen('homeScreen');
            }
        }

        async function startNewGame() {
            let hostPlayer = null;
            for (let i = 0; i < allPlayers.length; i++) {
                if (allPlayers[i].player_id == currentSession.host_player_id) {
                    hostPlayer = allPlayers[i];
                    break;
                }
            }
            
            const gamesData = await apiCall('getGames', { session_id: currentSession.session_id });
            const gameNumber = gamesData.length + 1;
            
            const data = await apiCall('createGame', {
                session_id: currentSession.session_id,
                game_number: gameNumber,
                editor_name: hostPlayer ? hostPlayer.username : 'Unknown'
            });
            
            if (data.error) {
                alert('Error creating game: ' + data.error);
            } else {
                currentGame = {
                    game_id: data.game_id,
                    game_number: gameNumber
                };
                currentHandNumber = 1;
                gameHands = [];
                document.getElementById('currentGameNumber').textContent = gameNumber;
                document.getElementById('gameArea').classList.remove('hidden');
                document.getElementById('newGameBtn').style.display = 'none';
                setupHandInputs();
            }
        }

        function setupHandInputs() {
            document.getElementById('currentHandNumber').textContent = currentHandNumber;
            document.getElementById('handMessage').innerHTML = '';
            const handInputs = document.getElementById('handInputs');
            let html = '';
            
            for (let i = 0; i < sessionPlayers.length; i++) {
                const player = sessionPlayers[i];
                html += '<div class="player-hand-row">' +
                    '<label>' + player.username + '</label>' +
                    '<input type="number" id="score_' + player.player_id + '" placeholder="Score">' +
                    '<div class="checkbox-group">' +
                    '<label><input type="checkbox" id="lockout_' + player.player_id + '" onchange="handleLockoutChange(' + player.player_id + ')"> Locked Out</label>' +
                    '</div>' +
                    '<div class="checkbox-group">' +
                    '<label><input type="checkbox" id="false_' + player.player_id + '" disabled> False</label>' +
                    '</div>' +
                    '</div>';
            }
            
            handInputs.innerHTML = html;
        }

        function handleLockoutChange(playerId) {
            const checkboxes = document.querySelectorAll('[id^="lockout_"]');
            for (let i = 0; i < checkboxes.length; i++) {
                const cb = checkboxes[i];
                const pId = cb.id.replace('lockout_', '');
                const falseCheckbox = document.getElementById('false_' + pId);
                
                if (cb.checked) {
                    if (pId != playerId) {
                        cb.checked = false;
                    } else {
                        falseCheckbox.disabled = false;
                    }
                } else {
                    falseCheckbox.disabled = true;
                    falseCheckbox.checked = false;
                }
            }
        }

        async function submitHand() {
            const messageDiv = document.getElementById('handMessage');
            const scores = [];
            let lockoutPlayerId = null;
            let falseLockout = false;
            
            for (let i = 0; i < sessionPlayers.length; i++) {
                const player = sessionPlayers[i];
                const scoreVal = parseInt(document.getElementById('score_' + player.player_id).value);
                
                if (isNaN(scoreVal)) {
                    messageDiv.innerHTML = '<div class="error">Please enter scores for all players</div>';
                    return;
                }
                
                scores.push({
                    player_id: player.player_id,
                    score: scoreVal
                });
                
                const isLockedOut = document.getElementById('lockout_' + player.player_id).checked;
                if (isLockedOut) {
                    lockoutPlayerId = player.player_id;
                    falseLockout = document.getElementById('false_' + player.player_id).checked;
                }
            }
            
            if (lockoutPlayerId === null) {
                messageDiv.innerHTML = '<div class="error">One player must lock out each hand</div>';
                return;
            }
            
            let hostPlayer = null;
            for (let i = 0; i < allPlayers.length; i++) {
                if (allPlayers[i].player_id == currentSession.host_player_id) {
                    hostPlayer = allPlayers[i];
                    break;
                }
            }
            
            const data = await apiCall('addHand', {
                game_id: currentGame.game_id,
                hand_number: currentHandNumber,
                scores: JSON.stringify(scores),
                editor_name: hostPlayer ? hostPlayer.username : 'Unknown'
            });
            
            if (data.error) {
                messageDiv.innerHTML = '<div class="error">Error: ' + data.error + '</div>';
            } else {
                gameHands.push({
                    hand_number: currentHandNumber,
                    lockout_player_id: lockoutPlayerId,
                    false_lockout: falseLockout,
                    scores: scores
                });
                
                currentHandNumber++;
                setupHandInputs();
                updateGameScores();
            }
        }

        async function updateGameScores() {
            const handsData = await apiCall('getHands', { game_id: currentGame.game_id });
            
            if (handsData.error) return;
            
            const playerScores = {};
            for (let i = 0; i < sessionPlayers.length; i++) {
                const player = sessionPlayers[i];
                playerScores[player.player_id] = {
                    username: player.username,
                    total: 0,
                    hands: []
                };
            }
            
            for (let i = 0; i < handsData.length; i++) {
                const hand = handsData[i];
                if (playerScores[hand.player_id]) {
                    playerScores[hand.player_id].total += Number(hand.score);
                    playerScores[hand.player_id].hands.push({
                        hand_number: hand.hand_number,
                        score: hand.score
                    });
                }
            }
            
            const scores = [];
            for (let key in playerScores) {
                scores.push(playerScores[key]);
            }
            scores.sort(function(a, b) {
                return a.total - b.total;
            });
            
            let html = '<h3>Current Scores</h3><table class="scores-table"><tr><th>Player</th><th>Total</th><th>Details</th></tr>';
            for (let i = 0; i < scores.length; i++) {
                const p = scores[i];
                let handDetails = '';
                for (let j = 0; j < p.hands.length; j++) {
                    const h = p.hands[j];
                    handDetails += 'H' + h.hand_number + ': ' + h.score + ' ';
                }
                html += '<tr><td>' + p.username + '</td><td>' + p.total + '</td><td><small>' + handDetails + '</small></td></tr>';
            }
            html += '</table>';
            
            document.getElementById('gameScores').innerHTML = html;
        }

        async function endGame() {
            if (!confirm('End this game?')) return;
            
            let hostPlayer = null;
            for (let i = 0; i < allPlayers.length; i++) {
                if (allPlayers[i].player_id == currentSession.host_player_id) {
                    hostPlayer = allPlayers[i];
                    break;
                }
            }
            
            const handsData = await apiCall('getHands', { game_id: currentGame.game_id });
            
            if (handsData.length === 0) {
                alert('Game has no hands');
                return;
            }
            
            const playerTotals = {};
            for (let i = 0; i < sessionPlayers.length; i++) {
                playerTotals[sessionPlayers[i].player_id] = 0;
            }
            
            for (let i = 0; i < handsData.length; i++) {
                const hand = handsData[i];
                playerTotals[hand.player_id] += Number(hand.score);
            }
            
            let winnerPlayerId = null;
            let lowestScore = Infinity;
            for (let playerId in playerTotals) {
                if (playerTotals[playerId] < lowestScore) {
                    lowestScore = playerTotals[playerId];
                    winnerPlayerId = playerId;
                }
            }
            
            const data = await apiCall('closeGame', {
                game_id: currentGame.game_id,
                lockout_player_id: winnerPlayerId,
                lockout_score: lowestScore,
                false_lockout: false,
                editor_name: hostPlayer ? hostPlayer.username : 'Unknown'
            });
            
            if (data.error) {
                alert('Error ending game: ' + data.error);
            } else {
                alert('Game ended!');
                document.getElementById('gameArea').classList.add('hidden');
                document.getElementById('newGameBtn').style.display = 'block';
                currentGame = null;
                gameHands = [];
            }
        }

        async function loadLeaderboard() {
            const contentDiv = document.getElementById('leaderboardContent');
            contentDiv.innerHTML = '<div class="loading">Loading leaderboard...</div>';
            
            const playersData = await apiCall('getPlayers', {});
            const sessionsData = await apiCall('getSessions', {});
            
            if (playersData.error || sessionsData.error) {
                contentDiv.innerHTML = '<div class="error">Error loading leaderboard data</div>';
                return;
            }
            
            let html = '<h3>Players</h3><table class="leaderboard-table"><tr><th>Player</th><th>Joined</th></tr>';
            for (let i = 0; i < playersData.length; i++) {
                const p = playersData[i];
                html += '<tr><td>' + p.username + '</td><td>' + p.date_added + '</td></tr>';
            }
            html += '</table><h3 style="margin-top: 20px;">Recent Sessions</h3><table class="leaderboard-table"><tr><th>Session</th><th>Date</th></tr>';
            for (let i = 0; i < sessionsData.length; i++) {
                const s = sessionsData[i];
                html += '<tr><td>' + s.title + '</td><td>' + s.date_started + '</td></tr>';
            }
            html += '</table>';
            
            contentDiv.innerHTML = html;
        }

        async function loadStats() {
            const contentDiv = document.getElementById('statsContent');
            contentDiv.innerHTML = '<div class="loading">Loading stats...</div>';
            
            const playersData = await apiCall('getPlayers', {});
            const gamesData = await apiCall('getSessions', {});
            
            if (playersData.error) {
                contentDiv.innerHTML = '<div class="error">Error loading stats</div>';
                return;
            }
            
            let html = '<h3>Overall Stats</h3><div class="stats-grid">';
            
            for (let i = 0; i < playersData.length; i++) {
                const player = playersData[i];
                html += '<div class="stat-card"><h4>' + player.username + '</h4><p class="stat-value">Coming Soon</p></div>';
            }
            
            html += '</div>';
            contentDiv.innerHTML = html;
        }

        window.addEventListener('DOMContentLoaded', function() {
            console.log('Lockout Tracker loaded');
        });
    </script>
